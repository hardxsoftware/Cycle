<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Of Violence</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Self-hosted Jumpers font */
        @font-face {
            font-family: 'Jumpers';
            src: url('Assets/font/jumpers.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Jumpers';
            src: url('Assets/font/jumperssemital.ttf') format('truetype');
            font-weight: 900;
            font-style: italic;
            font-display: swap;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: url('Assets/background_texture.png');
            background-size: auto;
            background-position: top left;
            background-repeat: repeat;
            background-attachment: fixed;
            font-family: 'Jumpers';
            color: #fff;
            -webkit-text-stroke: 1px #000;
            text-shadow: 1px 2px 2px #347b72 !important;
        }
        
        .hero-section {
            background-image: url('Assets/Artwork.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .artwork-container {
            display: none;
        }
        
        @media (max-width: 768px) {
            .hero-section {
                background-size: cover;
            }
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0.75;
                transform: scale(1.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .hero-section {
            animation: fadeInScale 1s ease-out;
        }
        
        .logo-container {
            opacity: 0;
            animation: fadeInDown 1s ease-out 0.5s forwards;
        }
        
        .lineup-container {
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
        }
        
        .artwork-container {
            opacity: 0;
            animation: fadeInScale 1s ease-out 1s forwards;
        }
        
        .tour-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0;
        }
        
        .tour-date-card {
            opacity: 0;
            transition: all 0.3s ease;
            padding: 2rem;
            border-radius: 0;
            cursor: pointer;
            text-align: center;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }
        
        .tour-date-card.visible {
            opacity: 1;
            animation: fadeIn 1s ease-out forwards;
        }
        
        .tour-date-card:hover {
            transform: translateY(-5px) scale(1.05);
        }
        
        .tour-time {
            font-size: 1.25em;
        }
        .tour-location {
            font-size: 2em;
        }
        .tour-venue {
            font-size: 2em;
            margin-top: 1em;
            margin-bottom: 1em;
        }
        .tour-date {
            font-size: 1.25em;
        }
        
        .separator {
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            margin: 0 auto;
            border-radius: 2px;
        }
        
        .cta-container img {
            max-width: 300px;
            max-height: 150px;
            opacity: 0;
        }
        
        .cta-container.visible img {
            animation: fadeIn 1s ease-out forwards;
        }
        
        /* Remove link styling */
        .tour-date-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .tour-date-link:hover {
            text-decoration: none;
            color: inherit;
        }
        
        .tour-date-link:focus {
            outline: none;
        }
        
        .tour-date-link:visited {
            color: inherit;
        }
        
        /* Tickets at Door Overlay */
        .tickets-at-door-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .tickets-at-door-overlay span {
            color: #fff;
            font-size: 1.5em;
            font-weight: 900;
            text-transform: uppercase;
            -webkit-text-stroke: 1px #000;
            text-shadow: 0 2px 2px #ff0000;
            font-family: 'Jumpers';
        }
        
        .tour-date-card:hover .tickets-at-door-overlay,
        .tour-date-card.active .tickets-at-door-overlay {
            opacity: 1;
        }
        
        /* Available Soon Overlay */
        .available-soon-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0;
        }
        
        .available-soon-overlay img {
            max-width: 60%;
            max-height: 60%;
            object-fit: contain;
        }
        
        .tour-date-card:hover .available-soon-overlay,
        .tour-date-card.active .available-soon-overlay {
            opacity: 1;
        }
        
        /* Mobile: Always show available soon overlays */
        @media (max-width: 768px) {
            .available-soon-overlay {
                opacity: 1;
                pointer-events: none;
            }
            
            .tour-date-card:hover .available-soon-overlay,
            .tour-date-card.active .available-soon-overlay {
                opacity: 1;
            }
            
            /* Mobile-specific centering and layout */
            .hero-section {
                padding: 1rem 0;
            }
            
            .logo-container {
                padding: 1rem !important;
            }
            
            .lineup-container {
                padding: 1rem !important;
            }
            
            .tour-dates-section {
                padding: 2rem 1rem !important;
            }
            
            .tour-grid {
                grid-template-columns: 1fr !important;
                grid-template-rows: repeat(8, 1fr) !important;
                gap: 0.5rem !important;
                max-width: 100% !important;
                padding: 0 0.5rem !important;
            }
            
            .tour-date-card {
                padding: 1.5rem !important;
                min-height: 120px !important;
            }
            
            .tour-location {
                font-size: 2em !important;
            }
            
            .tour-venue {
                font-size: 2em !important;
            }
            
            .tour-date {
                font-size: 1.25em !important;
            }
            
            .tour-time {
                font-size: 1.25em !important;
            }
            
            .cta-container img {
                max-width: 250px !important;
                max-height: 120px !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <section class="hero-section vh-100 vw-100 d-flex flex-column">
            <div class="logo-container d-flex justify-content-center align-items-center p-3" style="flex: 0 0 auto;">
                <div class="col-12 col-md-10 col-lg-10 col-xl-5 d-flex justify-content-center align-items-center">
                    <img src="Assets/Logo.png" alt="Logo" class="img-fluid" style="object-fit: contain;">
                </div>
            </div>
            
            <div class="middle-section flex-grow-1 d-flex justify-content-center align-items-center" style="min-height: 0;">
                <div class="artwork-container col-12 col-md-10 col-lg-8 h-100 d-flex justify-content-center align-items-center">
                </div>
            </div>
            
            <div class="lineup-container d-flex justify-content-center align-items-end p-3" style="flex: 0 0 auto;">
                <div class="col-12 col-md-10 col-lg-8">
                    <img src="Assets/Lineup.png" alt="Lineup" class="img-fluid" style="max-height: 17.5vh; object-fit: contain;">

        <!-- Tour Dates Section -->
        <section class="tour-dates-section vw-100 d-flex flex-column justify-content-center align-items-center py-5">
            <div class="container d-flex flex-column justify-content-center align-items-center">

                </div>
                <div class="separator mb-9"></div>
                <div class="tour-grid">
                <div class="tour-date-card">
                    <a href="https://livepocket.jp/e/cycloneofviolence" class="tour-date-link">
                        <h5 class="tour-date">4/17</h5>
                        <h3 class="tour-location">TOKYO</h3>
                        <h5 class="tour-venue">CLUB ASIA</h5>
                        <h5 class="tour-time">23:00</h5>
                    </a>
                </div>
                <div class="tour-date-card">
                    <a href="#" class="tour-date-link">
                        <h5 class="tour-date">4/18</h5>
                        <h3 class="tour-location">TOKYO</h3>
                        <h5 class="tour-venue">AKIHABARA ONGAKUZAKA</h5>
                        <h5 class="tour-time">19:00</h5>
                        <div class="tickets-at-door-overlay">
                            <span>TICKETS AT DOOR</span>
                        </div>
                    </a>
                </div>
                <div class="tour-date-card">
                    <a href="https://livepocket.jp/e/cycloneofviolence_osaka" class="tour-date-link">
                        <h5 class="tour-date">4/19</h5>
                        <h3 class="tour-location">OSAKA</h3>
                        <h5 class="tour-venue">SHINKAGURU</h5>

                    </a>
                </div>
                <div class="tour-date-card">
                    <a href="https://go.fansi.me/events/560002?utm_source=ig&utm_medium=social&utm_content=link_in_bio" class="tour-date-link">
                        <h5 class="tour-date">4/24</h5>
                        <h3 class="tour-location">TAIPEI</h3>
                        <h3 class="tour-venue">JACK STUDIO</h3>
                        <h5 class="tour-time">19:00</h5>
                    </a>
                </div>
                <div class="tour-date-card">
                    <a href="https://www.eventbrite.com/e/cycle-of-violence-tour-hong-kong-tickets-1984654997523?aff=oddtdtcreator" class="tour-date-link">
                        <h5 class="tour-date">4/25</h5>
                        <h3 class="tour-location">HONG KONG</h3>

                </div>
                 <div class="tour-date-card">
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSffYhympbaNpTr_EZYimcFnPT795zhUQpkOdobM5yxUEkYgsQ/viewform?pli=1" class="tour-date-link">
                        <h5 class="tour-date">5/1</h5>

                    </a>
                </div>
                <div class="tour-date-card">
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLScTMOxorjY2W3lLaY6RyUFgwKeRKILQdwWLqvwWgqVrg9B3cw/viewform" class="tour-date-link">
                        <h5 class="tour-date">5/2</h5>

                <div class="tour-date-card">
                    <a href="https://docs.google.com/spreadsheets/d/1EsmdggARjkoF2AQEzTWSuCJYjqGVf8ynA2gI7BG7pTU/edit?usp=drivesdk" class="tour-date-link">
                        <h5 class="tour-date">5/3</h5>

                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Scroll-triggered animations for tour dates
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    if (entry.target.classList.contains('cta-container')) {
                        // CTA appears immediately
                        entry.target.classList.add('visible');
                    } else {
                        // Tour dates appear after CTA (500ms delay + stagger)
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, 500 + index * 100);
                    }
                }
            });
        }, observerOptions);

        // Observe all tour date cards and CTA
        document.addEventListener('DOMContentLoaded', () => {
            const tourCards = document.querySelectorAll('.tour-date-card');
            const ctaContainer = document.querySelector('.cta-container');
            
            tourCards.forEach(card => {
                observer.observe(card);
                
                // Only add overlay functionality to cards that have overlays
                const overlay = card.querySelector('.available-soon-overlay');
                if (overlay) {
                    // Only add touch/click functionality on desktop
                    if (window.innerWidth > 768) {
                        card.addEventListener('touchstart', function(e) {
                            e.preventDefault();
                            this.classList.toggle('active');
                        });
                        
                        card.addEventListener('click', function(e) {
                            e.preventDefault();
                            this.classList.toggle('active');
                        });
                        
                        // Remove active class when mouse leaves
                        card.addEventListener('mouseleave', function() {
                            this.classList.remove('active');
                        });
                    }
                }
            });
            
            if (ctaContainer) {
                observer.observe(ctaContainer);
            }
        });
    </script>
</body>
</html>
